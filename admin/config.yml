backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # STAFF (already working)
  - label: "Staff"
    name: "staff"
    files:
      - name: "all-staff"
        label: "All Staff Members"
        file: "_data/staff.json"
        fields:
          - label: "Staff List"
            name: "staff"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Position", name: "position", widget: "string" }
              - { label: "Qualification/Experience", name: "details", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Status", name: "status", widget: "select", options: ["serving", "former"], default: "serving" }

  # UPDATES (Events, Announcements, News, Highlights)
  - label: "Updates"
    name: "updates"
    files:
      - name: "all-updates"
        label: "All Updates"
        file: "_data/updates.json"
        fields:
          - label: "Updates List"
            name: "updates"
            widget: "list"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["Event", "Announcement", "News", "Highlight"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Summary / Short Description", name: "summary", widget: "text" }
              - { label: "Full Details (optional)", name: "body", widget: "markdown", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Date / Time", name: "date", widget: "datetime", required: false }

  # VIDEOS
  - label: "Videos"
    name: "videos"
    files:
      - name: "all-videos"
        label: "All Videos"
        file: "_data/videos.json"
        fields:
          - label: "Videos List"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Video File (.mp4)", name: "video_file", widget: "file" }
              - { label: "Thumbnail (optional)", name: "thumbnail", widget: "image", required: false }

  # E-LEARNING MATERIALS (keep as before)
  - label: "E-Learning Materials"
    name: "elearning"
    folder: "_data/elearning"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Category", name: "category", widget: "select", options: ["ECE", "Lower Primary", "Upper Primary", "Secondary"] }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "File (PDF/DOCX)", name: "file", widget: "file" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }

  # REGISTRATION INFO (keep as before)
  - label: "Registration Info"
    name: "registration"
    folder: "_data/registration"
    create: true
    slug: "info"
    fields:
      - { label: "Page Heading", name: "heading", widget: "string", default: "Online Registration" }
      - { label: "Intro Text", name: "intro", widget: "markdown" }
      - { label: "Google Form Embed URL", name: "form_url", widget: "string" }
