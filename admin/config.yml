backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # 1. HOMEPAGE CONTENT
  - label: "Homepage"
    name: "homepage"
    files:
      - name: "content"
        label: "Homepage Content"
        file: "_data/homepage.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "KEMZ ACADEMIC CENTRE" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", default: "Hard Work Brings Success!" }
          - { label: "Hero Description", name: "hero_description", widget: "markdown", default: "Welcome to KEMZ ONLINE SERVICES — the official digital platform for KEMZ ACADEMIC CENTRE providing online registration, e-learning, academic updates, online results, and modern educational services." }
          - { label: "Hero Buttons", name: "hero_buttons", widget: "list", fields: [{ label: "Text", name: "text", widget: "string" }, { label: "Link", name: "link", widget: "string" }], default: [{"text":"Apply Online","link":"registration.html"},{"text":"View Results","link":"results-portal.html"},{"text":"Make Inquiries","link":"inqu.html"}] }
          - { label: "Announcement Bar", name: "announcements", widget: "list", fields: [{ label: "Text", name: "text", widget: "string" }], default: [{"text":"📢 2026 Online Registration Now Open"},{"text":"📘 E-Learning Materials Available"},{"text":"📝 Online Results Portal Active"}] }
          - { label: "About Section Title", name: "about_title", widget: "string", default: "Over 20 years of Academic Excellence!" }
          - { label: "About Section Text", name: "about_text", widget: "markdown", default: "Providing quality education from Pre‑School to Secondary level, nurturing future leaders with integrity and innovation." }
          - { label: "About Section Image", name: "about_image", widget: "image", default: "Kemz5.jpg" }
          - { label: "Services Section Title", name: "services_title", widget: "string", default: "Our Online Services" }
          - { label: "Services List", name: "services", widget: "list", fields: [{ label: "Icon (FontAwesome class)", name: "icon", widget: "string", default: "fas fa-question-circle" }, { label: "Title", name: "title", widget: "string" }, { label: "Description", name: "description", widget: "text" }], default: [{"icon":"fas fa-question-circle","title":"Inquiries","description":"Make online inquiries quickly and conveniently at the comfort of your home."},{"icon":"fas fa-bullhorn","title":"Updates","description":"Stay connected by getting updates and announcements about the happenings at KEMZ Academic Centre."},{"icon":"fas fa-file-signature","title":"Online Registration","description":"Apply for admission online quickly and conveniently."},{"icon":"fas fa-poll","title":"Results Portal","description":"Access and download student academic results online."},{"icon":"fas fa-laptop-code","title":"E-Learning","description":"Access educational materials and learning resources digitally."},{"icon":"fas fa-video","title":"Online Classes","description":"Participate in interactive digital learning sessions remotely."}] }
          - { label: "School Highlights Section Title", name: "highlights_title", widget: "string", default: "School Highlights" }
          - { label: "Highlights List", name: "highlights", widget: "list", fields: [{ label: "Image", name: "image", widget: "image" }, { label: "Caption", name: "caption", widget: "string" }], default: [{"image":"White.jpg","caption":"📚 Teachers Day"},{"image":"Tour.jpg","caption":"🚌 Recreation Tour"},{"image":"Game.jpg","caption":"🚌 Education Tour"},{"image":"Nurse.jpg","caption":"💼 Careers Day"},{"image":"Culture2.jpg","caption":"🎭 Cultural Day"},{"image":"Variety.jpg","caption":"🚌 Variety Show"},{"image":"Civilian.jpg","caption":"🚌 Civilian Day"},{"image":"Form2C.jpg","caption":"🏆 Building the Future Leaders"}] }
          - { label: "Quote Text", name: "quote_text", widget: "text", default: "Education is indeed a great equaliser. It can make a boy from a village become President of Zambia." }
          - { label: "Quote Image", name: "quote_image", widget: "image", default: "HH.jpg" }
          - { label: "Quote Author", name: "quote_author", widget: "string", default: "President Hakainde Hichilema" }
          - { label: "Government Article Title", name: "gov_title", widget: "string", default: "GOVERNMENT REAFFIRMS COMMITMENT TO DIGITAL EDUCATION" }
          - { label: "Article Image", name: "gov_image", widget: "image", default: "web.jpg" }
          - { label: "Article Intro", name: "gov_intro", widget: "markdown", default: "On 28 March, 2026, Information and Media Permanent Secretary Thabo Kawana, represented by ZANIS Director Loyce Saili, officiated at the launch of the KEMZ Academic Centre School Website and Internet Café in Kanyama-Lusaka." }
          - { label: "Article Full Text", name: "gov_full", widget: "markdown", default: "**Here are the highlights:**\n\n• The launch of the KEMZ Academic Centre School Website and Internet Café underscores Government’s commitment... (full text)" }
          - { label: "Leadership Name", name: "leader_name", widget: "string", default: "Mayungo Kennedy" }
          - { label: "Leadership Position", name: "leader_position", widget: "string", default: "School Director" }
          - { label: "Leadership Photo", name: "leader_image", widget: "image", default: "Kozo.jpg" }

  # 2. ABOUT PAGE
  - label: "About Page"
    name: "about"
    files:
      - name: "content"
        label: "About Page Content"
        file: "_data/about.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "About KEMZ Academic Centre" }
          - { label: "Hero Text", name: "hero_text", widget: "markdown", default: "Excellence in education since 2005 – nurturing future leaders with integrity and innovation." }
          - { label: "Introduction Text", name: "intro_text", widget: "markdown", default: "KEMZ Academic Centre is a premier educational institution dedicated to providing quality education to learners from Pre‑School through secondary levels. Founded in 2005, we have grown to become one of the leading academic institutions in Zambia." }
          - { label: "Introduction Photo", name: "intro_photo", widget: "image", default: "Nude.jpg" }
          - { label: "Motto", name: "motto", widget: "string", default: "Hard Work Brings Success!" }
          - { label: "Aim", name: "aim", widget: "string", default: "To provide quality education for all." }
          - { label: "Mission", name: "mission", widget: "text", default: "To provide a holistic education that develops learners intellectually, socially, and emotionally, preparing them for success in higher education and beyond." }
          - { label: "Vision", name: "vision", widget: "text", default: "To be a leading educational institution in giving an equal opportunity to everyone to acquire quality education, for education is key sustenance to development as it is an equalizer for all." }
          - { label: "Values", name: "values", widget: "list", fields: [{ label: "Value", name: "value", widget: "string" }], default: ["Excellence in Academics","Integrity and Ethics","Respect for Diversity","Innovation and Creativity","Community Engagement"] }
          - { label: "History Paragraphs", name: "history", widget: "list", fields: [{ label: "Paragraph", name: "paragraph", widget: "text" }], default: ["Kemz Academic Centre is a Private School whose founder is Mr Mayungo Kennedy, a teacher by profession who holds a bachelor's degree from the University of Africa.","The school was established in the year 2005. The school started as a Pre-School and Lower Primary School with just 15 learners. KEMZ Academic Centre has grown exponentially over the years with an expansion that now includes Upper Primary Level and Secondary Ordinary Level at Lusaka's main campus. Today, we serve over 1000 learners across all educational levels at the main campus.","A few years ago, another campus was established in Mumbwa. The campus runs from Pre-School to Grade 7 and has over 300 learners.","Our growth is attributed to our commitment to academic excellence and our dedicated staff."] }
          - { label: "Location Details", name: "location", widget: "object", fields: [{ label: "Lusaka Address", name: "lusaka", widget: "string", default: "Plot No 88/37 - Along Magwava Road, Makeni Villa, Lusaka District, Zambia." }, { label: "Mumbwa Address", name: "mumbwa", widget: "string", default: "Plot No ... - Along Old Mumbwa Road, Mumbwa District, Zambia." }] }
          - { label: "Contact Phones", name: "phones", widget: "object", fields: [{ label: "Director", name: "director", widget: "string", default: "+260 977916081" }, { label: "Lusaka Manager", name: "lusaka", widget: "string", default: "+260 977819249" }, { label: "Mumbwa Manager", name: "mumbwa", widget: "string", default: "+260 977505012" }, { label: "Accounts", name: "accounts", widget: "string", default: "+260 977432490" }] }
          - { label: "Contact Email", name: "email", widget: "string", default: "kemzacademiccentre@gmail.com" }
          - { label: "Office Hours", name: "hours", widget: "list", fields: [{ label: "Day", name: "day", widget: "string" }, { label: "Hours", name: "hours", widget: "string" }], default: [{"day":"Monday-Friday","hours":"7:30 AM - 5:00 PM"},{"day":"Saturday","hours":"8:00 AM - 12:00 PM"},{"day":"Sunday","hours":"Closed"}] }

  # 3. FAQ (Inquiries page)
  - label: "FAQ"
    name: "faq"
    files:
      - name: "questions"
        label: "Frequently Asked Questions"
        file: "_data/faq.json"
        fields:
          - { label: "FAQ List", name: "faq", widget: "list", fields: [{ label: "Question", name: "question", widget: "string" }, { label: "Answer", name: "answer", widget: "markdown" }], default: [{"question":"How do I register my child?","answer":"Click on the navigation menu on the top right corner and select option 7 - Registration. Fill in the registration form details and once done, click on submit."},{"question":"What are the school fees and requirements?","answer":"*Care Service:* Registration K20/once, School fee K895/termly, Maintenance K70/yearly, ID K70/once\n\n*Baby Class - Middle Class:* Registration K20/once, School fee K595/termly, Maintenance K70/yearly, ID K70/once\n\n*Reception - Grade 7:* Registration K20/once, School fee K475/termly, Maintenance K70/yearly, ID K70/once\n\n*Form 1 - Form 4:* Registration K20/once, School Fee K505/termly, Maintenance Fee K70 yearly, ID K70/once\n\n*Uniforms:* Day Care - Grade 4: K300 + K30 (boys socks) or K20 (girls socks); Grade 5 - 7: K330; Form 1 - 4: K560\n\n*Requirements:* 3 bottles hand wash sanitizer, 3 bottles chlorine & 6 rolls tissue. School bag (all grades). Big crayons, pencils, pens, 6-7 hard cover exercise books (Baby Class - Grade 4). 7-8 exercise books, pens (G5-7). 7-10 hard cover books, pens, scientific calculator, school dictionary (Form 1-4)."},{"question":"How can I access my child's results?","answer":"Click on the navigation menu icon on the top right corner, select option 8 (Results). Fill details: student ID number, select term and select the year. Click on fetch for results to display. To download click on 'Download PDF results slip'."},{"question":"What are the school hours?","answer":"The school operates from 07:20 hrs to 16:00 hrs."},{"question":"How do I contact my child's teacher?","answer":"Contact the school manager on +260977819249 for assistance on the contact details of your child's teacher."}] }

  # 4. QUIZZES (for E-Learning page)
  - label: "Quizzes"
    name: "quizzes"
    files:
      - name: "all"
        label: "All Quizzes"
        file: "_data/quizzes.json"
        fields:
          - { label: "Quizzes List", name: "quizzes", widget: "list", fields: [{ label: "ID (unique)", name: "id", widget: "string" }, { label: "Title", name: "title", widget: "string" }, { label: "Questions", name: "questions", widget: "list", fields: [{ label: "Question Text", name: "text", widget: "string" }, { label: "Options (4)", name: "options", widget: "list", min: 4, max: 4, fields: [{ label: "Option", name: "option", widget: "string" }] }, { label: "Correct Answer (a/b/c/d)", name: "correct", widget: "select", options: ["a","b","c","d"] }] }], default: [{"id":"ece","title":"ECE - Basic Literacy","questions":[{"text":"What letter comes after 'A'?","options":["Z","B","C","D"],"correct":"b"},{"text":"Which shape has three sides?","options":["Circle","Square","Triangle","Rectangle"],"correct":"c"},{"text":"What colour is the sun?","options":["Yellow","Blue","Green","Red"],"correct":"a"},{"text":"How many fingers on one hand?","options":["4","5","6","10"],"correct":"b"},{"text":"Which animal says 'meow'?","options":["Dog","Cow","Cat","Bird"],"correct":"c"},{"text":"2 + 2 = ?","options":["4","5","3","6"],"correct":"a"},{"text":"Which is a fruit?","options":["Carrot","Apple","Potato","Broccoli"],"correct":"b"},{"text":"Opposite of 'big'?","options":["Large","Huge","Tall","Small"],"correct":"d"},{"text":"Month after January?","options":["March","December","February","April"],"correct":"c"},{"text":"First day of the week?","options":["Friday","Monday","Sunday","Wednesday"],"correct":"b"}]},{"id":"lower","title":"Lower Primary - Mathematics","questions":[{"text":"15 + 7 = ?","options":["20","22","23","25"],"correct":"b"},{"text":"50 - 18 = ?","options":["28","30","32","34"],"correct":"c"},{"text":"8 × 4 = ?","options":["32","28","36","40"],"correct":"a"},{"text":"24 ÷ 6 = ?","options":["3","5","6","4"],"correct":"d"},{"text":"Smallest? 45,32,57,28","options":["45","28","32","57"],"correct":"b"},{"text":"100 - 37 = ?","options":["73","67","63","77"],"correct":"c"},{"text":"7 × 6 = ?","options":["36","48","40","42"],"correct":"d"},{"text":"⅓ of 18 = ?","options":["6","9","12","3"],"correct":"a"},{"text":"Minutes in 2 hours?","options":["60","120","90","180"],"correct":"b"},{"text":"Shape with four equal sides?","options":["Rectangle","Triangle","Square","Circle"],"correct":"c"}]},{"id":"upper","title":"Upper Primary - Mathematics Grade 5","questions":[{"text":"25 + 37 = ?","options":["52","62","72","82"],"correct":"b"},{"text":"⅗ of 25 = ?","options":["5","10","15","20"],"correct":"c"},{"text":"Prime number?","options":["15","21","29","33"],"correct":"c"},{"text":"π to two decimals?","options":["3.12","3.14","3.16","3.18"],"correct":"b"},{"text":"2x+5=15, x=?","options":["5","6","7","8"],"correct":"a"},{"text":"Area 8cm×5cm?","options":["13","26","40","45"],"correct":"c"},{"text":"0.75 as fraction?","options":["1/4","2/3","3/4","4/5"],"correct":"c"},{"text":"Sequence: 2,4,8,16,__?","options":["24","28","32","36"],"correct":"c"},{"text":"60 km/h for 2.5h = ?","options":["120","125","150","180"],"correct":"c"},{"text":"√144 = ?","options":["12","14","16","18"],"correct":"a"}]},{"id":"secondary","title":"Secondary O-Level - Biology","questions":[{"text":"Pumps blood?","options":["Brain","Heart","Lungs","Kidney"],"correct":"b"},{"text":"Plants make food by?","options":["Photosynthesis","Respiration","Transpiration","Fermentation"],"correct":"a"},{"text":"Mammal?","options":["Snake","Crocodile","Whale","Frog"],"correct":"c"},{"text":"Water loss from plants?","options":["Condensation","Evaporation","Precipitation","Transpiration"],"correct":"d"},{"text":"Basic unit of life?","options":["Atom","Cell","Tissue","Organ"],"correct":"b"},{"text":"Vitamin from sunlight?","options":["A","C","D","B12"],"correct":"c"},{"text":"Digestion begins in?","options":["Mouth","Stomach","Small intestine","Oesophagus"],"correct":"a"},{"text":"Gas exchange in leaf?","options":["Chloroplast","Stomata","Cuticle","Vein"],"correct":"b"},{"text":"Largest human organ?","options":["Heart","Liver","Skin","Brain"],"correct":"c"},{"text":"Normal body temp (°C)?","options":["35.5","36.0","36.5","37.0"],"correct":"d"}]}] }

  # 5. STAFF (already existing, keep)
  - label: "Staff"
    name: "staff"
    files:
      - name: "all-staff"
        label: "All Staff Members"
        file: "_data/staff.json"
        fields:
          - { label: "Staff List", name: "staff", widget: "list", fields: [{ label: "Name", name: "name", widget: "string" }, { label: "Position", name: "position", widget: "string" }, { label: "Qualification/Experience", name: "details", widget: "text" }, { label: "Photo", name: "image", widget: "image" }, { label: "Status", name: "status", widget: "select", options: ["serving", "former"], default: "serving" }] }

  # 6. UPDATES (already existing, keep)
  - label: "Updates"
    name: "updates"
    files:
      - name: "all-updates"
        label: "All Updates"
        file: "_data/updates.json"
        fields:
          - { label: "Updates List", name: "updates", widget: "list", fields: [{ label: "Type", name: "type", widget: "select", options: ["Event", "Announcement", "News", "Highlight"] }, { label: "Title", name: "title", widget: "string" }, { label: "Summary", name: "summary", widget: "text" }, { label: "Full Details", name: "body", widget: "markdown", required: false }, { label: "Image", name: "image", widget: "image", required: false }, { label: "Date", name: "date", widget: "datetime", required: false }] }

  # 7. VIDEOS (already existing, keep)
  - label: "Videos"
    name: "videos"
    files:
      - name: "all-videos"
        label: "All Videos"
        file: "_data/videos.json"
        fields:
          - { label: "Videos List", name: "videos", widget: "list", fields: [{ label: "Title", name: "title", widget: "string" }, { label: "Description", name: "description", widget: "text" }, { label: "Video File (.mp4)", name: "video_file", widget: "file" }, { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }] }

  # 8. LEARNING MATERIALS (already existing, keep)
  - label: "Learning Materials"
    name: "learning"
    files:
      - name: "all-materials"
        label: "All Learning Materials"
        file: "_data/learning.json"
        fields:
          - { label: "Materials List", name: "materials", widget: "list", fields: [{ label: "Category", name: "category", widget: "select", options: ["ECE", "Lower Primary", "Upper Primary", "Secondary"] }, { label: "Title", name: "title", widget: "string" }, { label: "Description", name: "description", widget: "text" }, { label: "File", name: "file", widget: "file" }, { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }] }

  # 9. REGISTRATION INFO (keep)
  - label: "Registration Info"
    name: "registration"
    folder: "_data/registration"
    create: true
    slug: "info"
    fields:
      - { label: "Page Heading", name: "heading", widget: "string", default: "Online Registration" }
      - { label: "Intro Text", name: "intro", widget: "markdown" }
      - { label: "Google Form Embed URL", name: "form_url", widget: "string" }
